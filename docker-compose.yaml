services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mailings}
      POSTGRES_USER: ${POSTGRES_USER:-mailings}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mailings}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PUBLISHED_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mailings} -d ${POSTGRES_DB:-mailings}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: build/Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    ports:
      - "${WEB_PORT:-8000}:8000"
    volumes:
      - .:/app
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
